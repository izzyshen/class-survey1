function mkTypeCard(tp){
  var p=tp.palette;
  return '<div class="type-card">'
    +'<div class="char-area" style="background:linear-gradient(160deg,'+d(p.dark,0.9)+','+p.mid+' 55%,'+d(p.light,0.85)+')">'

function d(hex,op){
  // returns hex with opacity as rgba
  var r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return 'rgba('+r+','+g+','+b+','+op+')';
}

function getPeriType(a){
  var r=a.reaction!==undefined?a.reaction:-1;
  var w=a.wtp!==undefined?a.wtp:-1;
  var reach=a.reach!==undefined?a.reach:-1;
  if(r===3)return 4;
  if(r===2)return 3;
  if(reach===2)return 2;
  if(r===0&&w>=1)return 0;
  return 1;
}

    for(var i=0;i<s.o.length;i++){
      var isSkipBtn=isSkip&&i===lastIdx;
      var cl="pb"+(isSkipBtn?" skip-btn":"");
      if(sel!==null)cl+=" dis";if(sel===i)cl+=" sel";
      var ck=sel===i?'<span style="font-size:16px;color:#ff6b35">\u2713</span>':"";
      p+='<button class="'+cl+'" '+(sel!==null?'':'onclick="poll('+i+')"')+'><div class="pbl"><span>'+s.o[i]+'</span>'+ck+'</div></button>';}
    var nx="";if(sel!==null)nx='<div style="animation:slideUp .3s ease"><button class="btn-nxt" onclick="nxt()">Next \u2192</button></div>';
    h+='<div class="screen"><div class="emoji">'+s.e+'</div><p class="lbl lbl-p">'+(s.t==="reaction"?"React":"Your take")+'</p><h2 class="q">'+s.q+'</h2><div class="pl">'+p+'</div>'+nx+'</div>';
  }
  else if(s.t==="results"){
    var tr=score===4?"\uD83C\uDFC6":score>=3?"\uD83C\uDF89":score>=2?"\uD83E\uDD13":"\uD83D\uDE02";
    var msg=score===4?"Marketing genius detected.":score>=3?"Not bad \u2014 you know more than most!":score>=2?"The market is wilder than you thought, huh?":"Influencer marketing: 1, You: 0. (For now.)";
    var pt=getPeriType(ans);var tp=TYPES[pt];
    var secs=[{l:"Business type",k:"biztype"},{l:"Your experience",k:"experience"},{l:"How you reach customers",k:"reach"},{l:"Your reaction",k:"reaction"},{l:"Willing to pay",k:"wtp"}];
    var sh="";for(var j=0;j<secs.length;j++){var sec=secs[j];if(ans[sec.k]!==undefined)
      sh+='<div class="rs"><div class="rsl">'+sec.l+'</div><div class="rsa">'+LBL[sec.k][ans[sec.k]]+'</div></div>';}
    var bd=sent?'<div class="badge">\u2713 Response recorded \u2014 thank you!</div>':"";
    var typeCard=mkTypeCard(tp);
    h+='<div class="screen"><div class="emoji">'+tr+'</div><h1 class="hero" style="font-size:34px;margin-bottom:6px">'+score+'/4 Correct!</h1><p class="sub" style="margin-bottom:20px">'+msg+'</p>'+typeCard+'<div class="rc"><div class="rch">Your Answers</div>'+sh+bd+'</div><div class="pit"><p><strong>We\u2019re building Peri.</strong> An AI agent that runs your entire influencer campaign \u2014 from discovery to booking to reporting. Come find us!</p></div><button class="btn-rst" onclick="restart()">\u2190 Play Again</button></div>';
  }
  app.innerHTML=h;
}

window.setName=function(v){ans.name=v;var btn=document.querySelector('.btn-nxt');if(btn)btn.disabled=v.trim()==="";};
window.guess=function(i){if(rev)return;sel=i;rev=true;if(i===SC[ci].c)score++;draw();};
window.poll=function(i){if(sel!==null)return;sel=i;ans[SC[ci].k]=i;draw();if(SC[ci].sk&&i===SC[ci].o.length-1)setTimeout(nxt,350);};
window.nxt=function(){
  if(ci===SC.length-2){submit();sent=true;}
  ci++;sel=null;rev=false;
  app.style.opacity=0;app.style.transition="opacity .2s";
  setTimeout(function(){draw();app.style.opacity=1;},200);
};
window.restart=function(){ci=0;score=0;sel=null;rev=false;ans={};sent=false;
  app.style.opacity=0;setTimeout(function(){draw();app.style.opacity=1;},200);};

draw();
</script>
</body>
</html>
